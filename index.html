<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="lib/jquery-3.7.1.min.js"></script>
    <script src="res/script/raf-interval.js"></script>
    <script src="res/class/Envelope.js"></script>
    <script src="res/class/BluetoothDeviceManager.js"></script>
    <script src="res/class/Coyote2.js"></script>
    <link rel="stylesheet" href="res/style/demo.css">
</head>
<body>
    <fieldset>
        <legend>Network</legend>
        <button id="demo-btn-connect">Connect</button>
        <button id="demo-btn-disconnect" disabled>Disconnect</button>
    </fieldset>
    <fieldset>
        <legend>Output</legend>
        <button id="demo-btn-start" disabled>Start</button>
        <button id="demo-btn-stop" disabled>Stop</button>
    </fieldset>
    <fieldset>
        <legend>Strength</legend>
        <div>
            <label for="demo-ipt-strength-a">A %:</label>
            <input type="number" id="demo-ipt-strength-a" value="0" min="0" max="100">
            <label for="demo-ipt-strength-b">B %:</label>
            <input type="number" id="demo-ipt-strength-b" value="0" min="0" max="100">
            <button id="demo-btn-strength" disabled>Set Strength</button>
        </div>
        <div>
            <label for="demo-ipt-strength-a">A Max:</label>
            <input type="number" id="demo-ipt-strength-a-max" value="0" min="0" max="200">
            <label for="demo-ipt-strength-b">B Max:</label>
            <input type="number" id="demo-ipt-strength-b-max" value="0" min="0" max="200">
            <button id="demo-btn-strength-max" disabled>Set Max Strength</button>
        </div>
    </fieldset>
    <fieldset>
        <legend>Wave</legend>
        <label for="demo-ipt-wave-z">X:</label>
        <input type="number" id="demo-ipt-wave-x" value="1" min="0" max="31">
        <label for="demo-ipt-wave-z">Y:</label>
        <input type="number" id="demo-ipt-wave-y" value="9" min="0" max="1023">
        <label for="demo-ipt-wave-z">Z:</label>
        <input type="number" id="demo-ipt-wave-z" value="31" min="0" max="31">
        <button id="demo-btn-wave">Set Wave (All)</button>
        <button id="demo-btn-wave-a">Set Wave (A)</button>
        <button id="demo-btn-wave-b">Set Wave (B)</button>
    </fieldset>
    <div class="demo-flex">
        <fieldset>
            <legend>Local State</legend>
            <div>
                A: <span id="demo-label-local-strength-a">0</span>
            </div>
            <div>
                B: <span id="demo-label-local-strength-b">0</span>
            </div>
            <div>
                Sent Frames:
                <div class="demo-send-frames">
                    <div class="frame"></div>
                    <div class="frame"></div>
                    <div class="frame"></div>
                    <div class="frame"></div>
                    <div class="frame"></div>
                    <div class="frame"></div>
                    <div class="frame"></div>
                    <div class="frame"></div>
                    <div class="frame"></div>
                    <div class="frame"></div>
                </div>
                <span id="demo-label-loop-count">0</span>
            </div>
            <div>
                Envelope Playing:
                <span id="demo-label-envelope-playing">false</span>
            </div>
            <div>
                Envelope Time:
                <span id="demo-label-envelope-time">0.0</span> / <span id="demo-label-envelope-end-time">0.0</span>
            </div>
        </fieldset>
        <fieldset>
            <legend>Host State</legend>
            <div>
                A: <span id="demo-label-strength-a">?</span>
            </div>
            <div>
                B: <span id="demo-label-strength-b">?</span>
            </div>
            <div>
                Battery: <span id="demo-label-battery">?</span>
            </div>
        </fieldset>
    </div>
    <div class="demo-flex">
        <fieldset>
            <legend>Video</legend>
            <label for="demo-video-input">Video File: </label>
            <input id="demo-video-input" type="file" accept="video/*" />
            <div style="margin-top: 12px;">
                <video id="demo-video-player" controls preload="metadata" tabindex="0" loop></video>
            </div>
            <div id="demo-video-time-display" title="Copy Time">0.000</div>
            <div>
                <button id="demo-btn-video-step-frame-1">←</button>
                <button id="demo-btn-video-step-frame-2">→</button>
            </div>
        </fieldset>
        <fieldset>
            <legend>Envelope</legend>
            <div>
                <button id="demo-btn-envelope-load">Load</button>
                <button id="demo-btn-envelope-unload">Unload</button>
                <button id="demo-btn-envelope-play" disabled>Play</button>
                <button id="demo-btn-envelope-pause" disabled>Pause</button>
                <button id="demo-btn-envelope-video-sync" disabled>Video Sync</button>
            </div>
            <div style="margin-top: 12px;">
                <input id="demo-envelope-file-input" type="file" accept=".json, .txt" />
            </div>
            <textarea id="demo-ipt-envelope-data"></textarea>
        </fieldset>
    </div>

    <script src="res/script/demo.js"></script>
</body>
</html>
