<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="lib/jquery-3.7.1.min.js"></script>
    <script src="res/script/raf-interval.js"></script>
    <script src="res/class/Envelope.js"></script>
    <script src="res/class/BluetoothDeviceManager.js"></script>
    <script src="res/class/Coyote2.js"></script>
    <link rel="stylesheet" href="res/style/demo.css">
</head>
<body>
    <fieldset>
        <legend>Network</legend>
        <button id="demo-btn-connect">Connect</button>
        <button id="demo-btn-disconnect" disabled>Disconnect</button>
    </fieldset>
    <fieldset>
        <legend>Output</legend>
        <button id="demo-btn-start" disabled>Start</button>
        <button id="demo-btn-stop" disabled>Stop</button>
    </fieldset>
    <fieldset>
        <legend>Strength</legend>
        <label for="demo-ipt-strength-a">A:</label>
        <input type="number" id="demo-ipt-strength-a" value="0">
        <label for="demo-ipt-strength-b">B:</label>
        <input type="number" id="demo-ipt-strength-b" value="0">
        <button id="demo-btn-strength" disabled>Set Strength</button>
    </fieldset>
    <fieldset>
        <legend>State</legend>
        <div>
            A: <span id="demo-label-strength-a">0</span>
        </div>
        <div>
            B: <span id="demo-label-strength-b">0</span>
        </div>
        <div>
            Send Frames:
            <div class="demo-send-frames">
                <div class="frame"></div>
                <div class="frame"></div>
                <div class="frame"></div>
                <div class="frame"></div>
                <div class="frame"></div>
                <div class="frame"></div>
                <div class="frame"></div>
                <div class="frame"></div>
                <div class="frame"></div>
                <div class="frame"></div>
            </div>
            <span id="demo-label-loop-count">0</span>
        </div>
    </fieldset>

    <script src="res/script/demo.js"></script>
</body>
</html>
